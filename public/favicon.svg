<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="22" fill="#fff0f5"/>
  <!-- 中央の花 -->
  <g transform="translate(50,50)">
    <ellipse rx="9" ry="16" fill="#f472b6" transform="rotate(0)"/>
    <ellipse rx="9" ry="16" fill="#f472b6" transform="rotate(72)"/>
    <ellipse rx="9" ry="16" fill="#f472b6" transform="rotate(144)"/>
    <ellipse rx="9" ry="16" fill="#f472b6" transform="rotate(216)"/>
    <ellipse rx="9" ry="16" fill="#f472b6" transform="rotate(288)"/>
    <circle r="6" fill="#fbbf24"/>
  </g>
  <!-- 左上の小花 -->
  <g transform="translate(22,22) scale(0.55)">
    <ellipse rx="9" ry="16" fill="#fb7185" transform="rotate(0)"/>
    <ellipse rx="9" ry="16" fill="#fb7185" transform="rotate(72)"/>
    <ellipse rx="9" ry="16" fill="#fb7185" transform="rotate(144)"/>
    <ellipse rx="9" ry="16" fill="#fb7185" transform="rotate(216)"/>
    <ellipse rx="9" ry="16" fill="#fb7185" transform="rotate(288)"/>
    <circle r="6" fill="#fbbf24"/>
  </g>
  <!-- 右下の小花 -->
  <g transform="translate(78,78) scale(0.55)">
    <ellipse rx="9" ry="16" fill="#fb7185" transform="rotate(36)"/>
    <ellipse rx="9" ry="16" fill="#fb7185" transform="rotate(108)"/>
    <ellipse rx="9" ry="16" fill="#fb7185" transform="rotate(180)"/>
    <ellipse rx="9" ry="16" fill="#fb7185" transform="rotate(252)"/>
    <ellipse rx="9" ry="16" fill="#fb7185" transform="rotate(324)"/>
